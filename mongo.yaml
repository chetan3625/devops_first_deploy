version: '3.8'
services:
  mongodb:
    image: mongo
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=chetan3625
      - MONGO_INITDB_ROOT_PASSWORD=chetan3625
  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=chetan3625
      - ME_CONFIG_MONGODB_ADMINPASSWORD=chetan3625
      - ME_CONFIG_MONGODB_SERVER=mongodb